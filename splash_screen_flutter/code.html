<style>
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slow-zoom {
            from { transform: scale(0.95); }
            to { transform: scale(1); }
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        .animate-fade-up {
            animation: fade-up 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-slow-zoom {
            animation: slow-zoom 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }
        body {
            background-color: #f8f9ff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
    </style>

<!-- Overlay Micro-interactions -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-fixed-dim to-transparent opacity-50"></div>
<script>
        // Simple micro-interaction for the progress bar to simulate application loading
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const bar = document.getElementById('progress-bar');
                if (bar) {
                    bar.style.width = '100%';
                }
            }, 500);

            // Optional: Auto-transition logic placeholder (e.g. to Dashboard)
            /*
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 4000);
            */
        });

        // Add a subtle parallax effect based on device orientation or mouse movement
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const logo = document.querySelector('.animate-slow-zoom');
            if (logo) {
                logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
