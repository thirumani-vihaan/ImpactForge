<!-- Suppressed BottomNavBar and FAB per instructions for Transactional Screen -->
<script>
        function toggleRole(role) {
            const volBtn = document.getElementById('roleVolunteer');
            const adminBtn = document.getElementById('roleAdmin');
            
            if(role === 'Volunteer') {
                volBtn.classList.add('role-pill-active');
                volBtn.classList.remove('text-outline');
                adminBtn.classList.remove('role-pill-active');
                adminBtn.classList.add('text-outline');
            } else {
                adminBtn.classList.add('role-pill-active');
                adminBtn.classList.remove('text-outline');
                volBtn.classList.remove('role-pill-active');
                volBtn.classList.add('text-outline');
            }
        }

        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Micro-interaction: button pulse
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
            setTimeout(() => {
                alert('Account Created Successfully!');
                btn.innerHTML = 'Register <span class="material-symbols-outlined">arrow_forward</span>';
            }, 1500);
        });
    </script>
