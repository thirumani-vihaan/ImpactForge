<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background antialiased">

<!-- Subtle atmospheric background effect -->

</div>
<div class="w-full max-w-[440px] z-10">
<!-- Card Container (Surface 1) -->
<div class="bg-surface-container-lowest rounded-xl p-md md:p-lg soft-card-shadow border border-outline-variant flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-lg flex flex-col items-center w-full">
<img alt="NayePankh Foundation Logo" class="w-48 h-auto mb-xs" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOng0A_nB40syAdZEVx6fUqNR2WKQQGw4js5bJyriWExuwoMoXaXCi7SbyZaSVLQIK8n0tAayDASqSVHkyNua6JybKH_imVBj61-_XXLeoS6pkhOHTLD2_jFaUHZSpftjBoidMCUAfN4nYlCIo33cqv1Ahl3xEuGCD4NvXnu9o0Iy_KzuyH2DLTeh3JplfNZvqYpbFUCxdXSau09OLb3ubiubr2RV6eN2Ts0QsEur8JWEZOym2R8YZz9fI7USLiyEma8S2R36JxOyh"/>
<h1 class="font-headline-md text-headline-md text-primary mt-xs text-center">NayePankh Hub</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-xs">Empowering communities through action</p>
</div>
<!-- Flutter Form Simulation (Column Layout) -->
<form class="w-full space-y-md" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative flex items-center input-focus-effect border border-outline-variant rounded-lg bg-surface-container-low transition-all duration-200">
<span class="material-symbols-outlined ml-sm text-outline">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-sm py-3 text-body-md placeholder:text-outline" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center input-focus-effect border border-outline-variant rounded-lg bg-surface-container-low transition-all duration-200">
<span class="material-symbols-outlined ml-sm text-outline">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-sm py-3 text-body-md placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="mr-sm text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Login Button -->
<button class="w-full primary-gradient text-on-primary font-label-md text-label-md py-3.5 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-md" type="submit">
                        Login
                    </button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Sign-in (Google) -->
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md py-3.5 rounded-lg hover:bg-surface-container-low transition-all duration-200" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">

                </p>

<!-- Success Message Micro-interaction -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 transform scale-90 opacity-0 pointer-events-none transition-all duration-300 z-[100]" id="toast">
<div class="bg-inverse-surface text-inverse-on-surface px-md py-sm rounded-full shadow-lg flex items-center gap-base">
<span class="material-symbols-outlined text-primary-fixed">check_circle</span>
<span class="font-label-md">Logging you in...</span>
</div>
</div>
<script>
        // Handle form submission animation
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const toast = document.getElementById('toast');
            toast.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');
            toast.classList.add('scale-100', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('scale-90', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('scale-100', 'opacity-100');
            }, 3000);
        });

        // Toggle Password Visibility
        const toggleBtn = document.querySelector('button .material-symbols-outlined:contains("visibility")');
        if (toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const input = document.getElementById('password');
                const icon = toggleBtn;
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }

        // Search text helper for the toggle since :contains isn't standard
        document.querySelectorAll('button').forEach(btn => {
            const span = btn.querySelector('.material-symbols-outlined');
            if (span && span.textContent === 'visibility') {
                btn.addEventListener('click', () => {
                    const input = document.getElementById('password');
                    if (input.type === 'password') {
                        input.type = 'text';
                        span.textContent = 'visibility_off';
                    } else {
                        input.type = 'password';
                        span.textContent = 'visibility';
                    }
                });
            }
        });
    </script>
